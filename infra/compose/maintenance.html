<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifter — תחזוקה</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: #3b82f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .spinner {
      margin: 0 auto 32px;
      width: 48px;
      height: 48px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .retry-btn:hover {
      background: #2563eb;
    }
    .retry-btn:active {
      transform: scale(0.97);
    }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #475569;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="6" width="24" height="20" rx="3" stroke="white" stroke-width="2.2" fill="none"/>
          <line x1="4" y1="12" x2="28" y2="12" stroke="white" stroke-width="2.2"/>
          <line x1="11" y1="6" x2="11" y2="12" stroke="white" stroke-width="2.2"/>
          <line x1="21" y1="6" x2="21" y2="12" stroke="white" stroke-width="2.2"/>
          <circle cx="10" cy="18" r="1.5" fill="white"/>
          <circle cx="16" cy="18" r="1.5" fill="white"/>
          <circle cx="22" cy="18" r="1.5" fill="white"/>
          <circle cx="10" cy="22.5" r="1.5" fill="white"/>
          <circle cx="16" cy="22.5" r="1.5" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">Shifter</span>
    </div>

    <!-- Spinner -->
    <div class="spinner"></div>

    <!-- Message -->
    <h1>אנחנו חוזרים בקרוב</h1>
    <p class="subtitle">המערכת בתחזוקה כרגע. נחזור תוך דקות ספורות.</p>

    <!-- Retry button -->
    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      נסה שוב
    </button>

    <!-- Footer -->
    <div class="footer">
      <a href="https://ofeklabs.com" target="_blank" rel="noopener noreferrer">Ofek Labs</a>
    </div>
  </div>
</body>
</html>

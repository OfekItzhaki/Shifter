version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible local storage) ────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API (ASP.NET Core) ─────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "${REDIS_HOST}:6379"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
      Solver__BaseUrl: "http://solver:${SOLVER_PORT}"
      App__FrontendBaseUrl: ${APP_FRONTEND_BASE_URL:-http://localhost:3000}
      App__ApiBaseUrl: ${APP_API_BASE_URL:-http://localhost:5000}
      Storage__S3__BucketName: ${STORAGE_S3_BUCKET_NAME:-}
      Storage__S3__Region: ${STORAGE_S3_REGION:-us-east-1}
      Storage__S3__AccessKey: ${STORAGE_S3_ACCESS_KEY:-}
      Storage__S3__SecretKey: ${STORAGE_S3_SECRET_KEY:-}
      Storage__S3__ServiceUrl: ${STORAGE_S3_SERVICE_URL:-}
      Storage__S3__PublicBaseUrl: ${STORAGE_S3_PUBLIC_BASE_URL:-}
      Storage__S3__ForcePathStyle: ${STORAGE_S3_FORCE_PATH_STYLE:-false}
      AutoScheduler__Enabled: ${AUTO_SCHEDULER_ENABLED:-false}
      AI__ApiKey: ${AI_API_KEY:-}
      AI__Model: ${AI_MODEL:-gpt-4o}
      SendGrid__ApiKey: ${SENDGRID_API_KEY:-}
      SendGrid__FromEmail: ${SENDGRID_FROM_EMAIL:-noreply@shifter.app}
      SendGrid__FromName: ${SENDGRID_FROM_NAME:-Shifter}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      Twilio__WhatsAppFrom: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Solver (Python + OR-Tools) ─────────────────────────────
  solver:
    build:
      context: ../../apps/solver
      dockerfile: ../../infra/docker/solver.Dockerfile
    restart: unless-stopped
    environment:
      SOLVER_TIMEOUT_SECONDS: ${SOLVER_TIMEOUT_SECONDS}
    ports:
      - "${SOLVER_PORT}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── Frontend (Next.js) ─────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${API_PORT}"
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:

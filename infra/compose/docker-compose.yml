x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible local storage) ────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API (ASP.NET Core) ─────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "${REDIS_HOST}:6379,password=${REDIS_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
      Solver__BaseUrl: "http://solver:${SOLVER_PORT}"
      App__FrontendBaseUrl: ${APP_FRONTEND_BASE_URL:-http://localhost:3000}
      App__ApiBaseUrl: ${APP_API_BASE_URL:-http://localhost:5000}
      Storage__S3__BucketName: ${STORAGE_S3_BUCKET_NAME:-}
      Storage__S3__Region: ${STORAGE_S3_REGION:-us-east-1}
      Storage__S3__AccessKey: ${STORAGE_S3_ACCESS_KEY:-}
      Storage__S3__SecretKey: ${STORAGE_S3_SECRET_KEY:-}
      Storage__S3__ServiceUrl: ${STORAGE_S3_SERVICE_URL:-}
      Storage__S3__PublicBaseUrl: ${STORAGE_S3_PUBLIC_BASE_URL:-}
      Storage__S3__ForcePathStyle: ${STORAGE_S3_FORCE_PATH_STYLE:-false}
      AutoScheduler__Enabled: ${AUTO_SCHEDULER_ENABLED:-false}
      AI__ApiKey: ${AI_API_KEY:-}
      AI__BaseUrl: ${AI_BASE_URL:-}
      AI__Model: ${AI_MODEL:-gpt-4o}
      Feedback__DeveloperEmail: ${FEEDBACK_DEVELOPER_EMAIL:-ofeklabs@outlook.com}
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__FromEmail: ${RESEND_FROM_EMAIL:-noreply@shifter.app}
      Resend__FromName: ${RESEND_FROM_NAME:-Shifter}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      Twilio__WhatsAppFrom: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      LemonSqueezy__ApiKey: ${LEMONSQUEEZY_API_KEY:-}
      LemonSqueezy__WebhookSecret: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      LemonSqueezy__StoreId: ${LEMONSQUEEZY_STORE_ID:-}
      LemonSqueezy__DefaultVariantId: ${LEMONSQUEEZY_DEFAULT_VARIANT_ID:-}
      LemonSqueezy__TestVariantId: ${LEMONSQUEEZY_TEST_VARIANT_ID:-}
      HealthCheck__PushoverUserKey: ${PUSHOVER_USER_KEY:-}
      HealthCheck__PushoverAppToken: ${PUSHOVER_APP_TOKEN:-}
      HealthCheck__IntervalSeconds: ${HEALTH_CHECK_INTERVAL_SECONDS:-300}
      HealthCheck__AlertCooldownSeconds: ${HEALTH_CHECK_ALERT_COOLDOWN_SECONDS:-3600}
      Seq__ServerUrl: "http://seq:5341"
    ports:
      - "127.0.0.1:${API_PORT}:8080"
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Solver (Python + OR-Tools) ─────────────────────────────
  solver:
    build:
      context: ../../apps/solver
      dockerfile: ../../infra/docker/solver.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    environment:
      SOLVER_TIMEOUT_SECONDS: ${SOLVER_TIMEOUT_SECONDS}
      SOLVE_TIMEOUT_SECONDS: ${SOLVE_TIMEOUT_SECONDS:-120}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── Frontend (Next.js) ─────────────────────────────────────
  web:
    image: shifter-web:${COMPOSE_PROJECT_NAME:-local}
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${API_PORT}"
    ports:
      - "127.0.0.1:${WEB_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Seq (Structured Log Server) ──────────────────────────────
  seq:
    image: datalust/seq:2024.3
    restart: unless-stopped
    logging: *default-logging
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    expose:
      - "5341"
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
  seq_data:

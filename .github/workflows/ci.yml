name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── .NET API ────────────────────────────────────────────────────────────────
  api:
    name: API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Jobuler.sln

      - name: Build
        run: dotnet build Jobuler.sln --no-restore --configuration Release

      - name: Test (unit + integration, skip solver-dependent tests)
        run: |
          dotnet test Jobuler.sln \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --filter "Category!=RequiresSolver"

  # ── Python Solver ───────────────────────────────────────────────────────────
  solver:
    name: Solver Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/solver

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .
        continue-on-error: true

      - name: Run solver unit tests
        run: pytest tests/ -v --timeout=60

      - name: Solver health check
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          kill %1

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}

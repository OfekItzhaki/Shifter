name: Customer-Hosted Preflight

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/customer-hosted-preflight.yml"
      - "README.md"
      - "apps/api/**"
      - "apps/web/**"
      - "apps/solver/**"
      - "infra/compose/**"
      - "infra/docker/**"
      - "infra/migrations/**"
      - "infra/scripts/**"
      - "docs/AI-DEPLOYMENT-MODES.md"
      - "docs/CLOUDFLARE-EDGE-SECURITY.md"
      - "docs/CUSTOMER-HOSTED-DEPLOYMENT.md"
      - "docs/CUSTOMER-HOSTED-HANDOFF-NOTES.md"
      - "docs/MANUAL-SELF-SERVICE-QA-CHECKLIST.md"
      - "docs/MANUAL-SELF-SERVICE-SCHEDULING.md"
      - "docs/SELF-SERVICE-HOLIDAY-CALENDAR-CONTRACT.md"
      - "docs/SELF-SERVICE-PORTABILITY-CONTRACT.md"
  push:
    branches:
      - feat/self-service-client-ready
    paths:
      - ".github/workflows/customer-hosted-preflight.yml"
      - "README.md"
      - "apps/api/**"
      - "apps/web/**"
      - "apps/solver/**"
      - "infra/compose/**"
      - "infra/docker/**"
      - "infra/migrations/**"
      - "infra/scripts/**"
      - "docs/AI-DEPLOYMENT-MODES.md"
      - "docs/CLOUDFLARE-EDGE-SECURITY.md"
      - "docs/CUSTOMER-HOSTED-DEPLOYMENT.md"
      - "docs/CUSTOMER-HOSTED-HANDOFF-NOTES.md"
      - "docs/MANUAL-SELF-SERVICE-QA-CHECKLIST.md"
      - "docs/MANUAL-SELF-SERVICE-SCHEDULING.md"
      - "docs/SELF-SERVICE-HOLIDAY-CALENDAR-CONTRACT.md"
      - "docs/SELF-SERVICE-PORTABILITY-CONTRACT.md"
  workflow_dispatch:

jobs:
  package-preflight:
    name: Package Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Run customer-hosted package preflight
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $output = @()
          $exitCode = 0

          try {
            $output = & ./infra/scripts/test-customer-hosted-package.ps1 -EnvFile ./infra/compose/.env.customer.example 2>&1
            $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
          } catch {
            $output += $_ | Out-String
            $exitCode = 1
          }

          $output | ForEach-Object { Write-Host $_ }

          if ($exitCode -ne 0) {
            $tail = ($output | Select-Object -Last 120 | Out-String).Trim()
            $escaped = $tail.Replace("%", "%25").Replace("`r", "").Replace("`n", "%0A")
            Write-Host "::error title=Customer-hosted preflight failed::$escaped"
            exit $exitCode
          }

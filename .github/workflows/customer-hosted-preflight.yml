name: Customer-Hosted Preflight

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
      - feat/self-service-client-ready
  workflow_dispatch:

jobs:
  package-preflight:
    name: Package Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Run customer-hosted package preflight
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $output = @()
          $exitCode = 0

          try {
            $output = & ./infra/scripts/test-customer-hosted-package.ps1 -EnvFile ./infra/compose/.env.customer.example 2>&1
            $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
          } catch {
            $output += $_ | Out-String
            $exitCode = 1
          }

          $output | ForEach-Object { Write-Host $_ }

          if ($exitCode -ne 0) {
            $tail = ($output | Select-Object -Last 120 | Out-String).Trim()
            $escaped = $tail.Replace("%", "%25").Replace("`r", "").Replace("`n", "%0A")
            Write-Host "::error title=Customer-hosted preflight failed::$escaped"
            exit $exitCode
          }

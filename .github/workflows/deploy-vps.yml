name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/shifter
            echo "=== Current commit ==="
            git rev-parse --short HEAD
            
            echo "=== Pulling latest ==="
            git pull origin main
            
            echo "=== Cleaning untracked files in apps/web ==="
            git clean -fd apps/web/
            
            echo "=== Verify middleware.ts is gone ==="
            ls apps/web/middleware.ts 2>/dev/null && echo "ERROR: middleware.ts still exists!" || echo "OK: middleware.ts removed"
            
            echo "=== Verify layout.tsx has correct provider order ==="
            grep -n "NextIntlClientProvider" apps/web/app/layout.tsx | head -3

            cd infra/compose
            echo "=== Stopping existing containers ==="
            docker compose down --remove-orphans || true
            
            echo "=== Removing stale containers ==="
            docker container prune -f
            
            echo "=== Rebuilding web (no cache) ==="
            docker compose build --no-cache web
            
            echo "=== Starting all services ==="
            docker compose up -d --remove-orphans
            
            echo "=== Waiting for services to start ==="
            sleep 15

            # Run any new migrations (idempotent — safe to re-run)
            echo "=== Running migrations ==="
            cd /opt/shifter
            for f in infra/migrations/*.sql; do
              docker exec -i compose-postgres-1 psql -U jobuler -d jobuler < "$f" 2>&1 | grep -v "already exists" | grep -v "skipping" || true
            done
            
            echo "=== Testing web response ==="
            docker compose exec -T web sh -c 'wget -qO /dev/null http://$(cat /etc/hosts | tail -1 | cut -f1):3000/ 2>&1' && echo "OK: 200" || echo "FAIL: still 500"
            
            echo "=== Web logs ==="
            docker compose logs web --tail 10
            
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"

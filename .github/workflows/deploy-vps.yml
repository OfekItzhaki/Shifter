name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.shifter.ofeklabs.com \
            --build-arg NEXT_PUBLIC_APP_VERSION=${{ github.sha }} \
            -t shifter-web:latest \
            -f infra/docker/web.Dockerfile \
            apps/web/

      - name: Save Docker image to tar
        run: |
          docker save shifter-web:latest | gzip > shifter-web.tar.gz
          ls -lh shifter-web.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "shifter-web.tar.gz"
          target: "/tmp/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/shifter

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Loading pre-built web image ==="
            docker load < /tmp/shifter-web.tar.gz
            rm -f /tmp/shifter-web.tar.gz

            cd infra/compose

            echo "=== Restarting services (near-zero downtime) ==="
            docker compose up -d --remove-orphans --force-recreate web
            
            echo "=== Waiting for web to start ==="
            sleep 10

            echo "=== Running migrations ==="
            cd /opt/shifter
            for f in infra/migrations/*.sql; do
              docker exec -i compose-postgres-1 psql -U jobuler -d jobuler < "$f" 2>&1 | grep -v "already exists" | grep -v "skipping" || true
            done

            echo "=== Web logs ==="
            cd infra/compose
            docker compose logs web --tail 5

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Assert production ref
        if: github.ref_name != 'main'
        run: |
          echo "::error title=Production deploy must run from main::Deploy to VPS is production-only. Deploy develop to staging first, then merge develop to main before running this workflow."
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "api=$(echo "$CHANGED" | grep -q '^apps/api/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "web=$(echo "$CHANGED" | grep -q '^apps/web/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "infra=$(echo "$CHANGED" | grep -q '^infra/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qE '^(\.github/workflows/deploy-vps\.yml|infra/)'; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.changes.outputs.api == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build API
        if: steps.changes.outputs.api == 'true'
        working-directory: apps/api
        run: |
          dotnet restore Jobuler.sln
          dotnet build Jobuler.sln --no-restore --configuration Release

      - name: Run API tests
        if: steps.changes.outputs.api == 'true'
        working-directory: apps/api
        run: |
          dotnet test Jobuler.sln \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --filter "Category!=RequiresSolver"

      - name: Setup Node.js
        if: steps.changes.outputs.web == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Build frontend
        if: steps.changes.outputs.web == 'true'
        working-directory: apps/web
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.shifter.ofeklabs.com
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build web Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.shifter.ofeklabs.com \
            --build-arg NEXT_PUBLIC_APP_VERSION=${{ github.sha }} \
            -t shifter-web:latest \
            -f infra/docker/web.Dockerfile \
            apps/web/

      - name: Save Docker image to tar
        run: |
          docker save shifter-web:latest | gzip > shifter-web.tar.gz
          ls -lh shifter-web.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "shifter-web.tar.gz"
          target: "/tmp/"
          timeout: 120s
          command_timeout: 10m

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/shifter

            echo "=== Pulling production code ==="
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            test "$(git rev-parse HEAD)" = "${{ github.sha }}"

            echo "=== Loading pre-built web image ==="
            docker load < /tmp/shifter-web.tar.gz
            rm -f /tmp/shifter-web.tar.gz

            echo "=== Tagging current images as rollback targets ==="
            cd /opt/shifter/infra/compose
            docker compose images --format json 2>/dev/null | jq -r '.[].Tag' > /dev/null 2>&1 || true
            docker tag shifter-web:latest shifter-web:previous 2>/dev/null || true
            docker tag compose-api:latest compose-api:previous 2>/dev/null || true

            echo "=== Running migrations ==="
            cd /opt/shifter
            chmod +x infra/scripts/run-migrations.sh 2>/dev/null || true
            bash infra/scripts/run-migrations.sh

            echo "=== Rebuilding API and restarting services ==="
            cd /opt/shifter/infra/compose
            docker compose up -d --build --force-recreate --remove-orphans api solver seq web

            echo "=== Waiting for services to start ==="
            sleep 10

            echo "=== Readiness check ==="
            if ! curl -sf --max-time 10 http://localhost:5000/ready; then
              echo "API readiness check failed; attempting rollback..."
              docker tag compose-api:previous compose-api:latest 2>/dev/null || true
              docker tag shifter-web:previous shifter-web:latest 2>/dev/null || true
              docker compose up -d --force-recreate api web
              sleep 5
              echo "=== Post-rollback status ==="
              docker compose ps
              echo "Deploy failed; rolled back to previous version"
              exit 1
            fi

            echo "=== Service status ==="
            docker compose ps

            echo "Deployed $(git rev-parse --short HEAD) at $(date)"

      - name: Hosted smoke check
        shell: pwsh
        run: |
          ./infra/scripts/smoke-hosted-vps.ps1 `
            -WebBaseUrl https://shifter.ofeklabs.com `
            -ApiBaseUrl https://api.shifter.ofeklabs.com
